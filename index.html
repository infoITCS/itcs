<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITCS | IT Solutions, Cloud & Cybersecurity in Pakistan</title>
    <meta name="description" content="ITCS delivers enterprise IT solutions across Pakistan — cloud, cybersecurity, networking, consulting, and managed services that help businesses modernize and grow." />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://code.tidio.co" />
    <!-- Non-blocking Bootstrap CSS -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <noscript>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    </noscript>
  </head>
  <body style="background-color: #0f192e; background-image: radial-gradient(ellipse 70% 60% at 85% 20%, rgba(0,138,189,0.4) 0%, transparent 65%), radial-gradient(ellipse 50% 50% at 15% 85%, rgba(0,91,169,0.35) 0%, transparent 60%);">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Bootstrap JS not required: nav toggle is React-controlled -->
    <script>
      // Defer Tidio chat until the page is idle so it does not hurt TBT/LCP
      (function () {
        var loaded = false;
        function loadTidio() {
          if (loaded) return;
          loaded = true;
          var s = document.createElement('script');
          s.src = '//code.tidio.co/6upntau7pxerriyh8lkytwftzqhjr3zo.js';
          s.async = true;
          document.body.appendChild(s);
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadTidio, { timeout: 4000 });
        } else {
          window.addEventListener('load', function () {
            setTimeout(loadTidio, 2500);
          });
        }
        ;['pointerdown', 'keydown', 'touchstart', 'scroll'].forEach(function (evt) {
          window.addEventListener(evt, loadTidio, { once: true, passive: true });
        });
      })();
    </script>
  </body>
</html>
